name: Create Infra with Terraform

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/terraform-devops.yml'   # ✅ FIX: must be array
  pull_request:
    branches:
      - main                                       # ✅ FIX: cannot be "none"
  workflow_dispatch:

env:
  STORAGE_ACCOUNT_NAME: storagetfstate013
  RESOURCE_GROUP_NAME: rg-terraform-state
  CONTAINER_NAME: tfstate
  BLOB_NAME: terraform.tfstate
  WORKING_DIRECTORY: 05_Web_Sql_database

jobs:
  scan-terraform-config:
    runs-on: ubuntu-latest
    name: Scan Terraform with Checkov

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ FIX: was @master

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12   # ✅ FIX: no @master
        with:
          directory: ${{ env.WORKING_DIRECTORY }}
          soft_fail: true

  deploy-azure-infra-terraform:
    name: Deploy to Azure with Terraform
    runs-on: ubuntu-latest
    environment: production
    needs: [scan-terraform-config]

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1          # ✅ FIX: casing + version
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Terraform backend state storage
        uses: azure/cli@v2            # ✅ FIX: updated
        with:
          inlineScript: |
            az group create --name $RESOURCE_GROUP_NAME --location westeurope

            az storage account create --name $STORAGE_ACCOUNT_NAME \
              --resource-group $RESOURCE_GROUP_NAME \
              --sku Standard_LRS

            az storage container create \
              --name $CONTAINER_NAME \
              --account-name $STORAGE_ACCOUNT_NAME

            cat <<EOT > backend.tf
            terraform {
              backend "azurerm" {
                resource_group_name   = "$RESOURCE_GROUP_NAME"
                storage_account_name  = "$STORAGE_ACCOUNT_NAME"
                container_name        = "$CONTAINER_NAME"
                key                   = "$BLOB_NAME"
              }
            }
            EOT

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3   # ✅ FIX
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Format
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
